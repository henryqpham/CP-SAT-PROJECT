# SCENARIO (editable) — one rule set. Copy this file, tweak a value, then solve + compare.
# This is the ONLY kind of file you edit to change constraints.

name: example
description: Describe what this scenario represents.

# The day's bounds; CP-SAT places everything inside this window.
day_start: "06:00"
day_end: "22:00"

rules:
  # Minutes that must pass after a meal ends before an exercise activity may start.
  # Change this between scenarios to see how CP-SAT reshuffles the day.
  exercise_gap_after_meal_min: 60

# What CP-SAT optimizes for (your solver defines the options).
objective: minimize_makespan

solver:
  max_time_seconds: 10
