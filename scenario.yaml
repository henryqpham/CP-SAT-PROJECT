# Rules — the ONLY file you edit to try a different day.
name: baseline

# Day window. Times are HH:MM; convert to minutes from midnight in code.
earliest_departure: "08:00"   # can't leave before 8 AM
must_be_home_by: "22:00"      # back by 10 PM

# Toggle the activity and the conditional rule.
do_kiteboard: true            # set false to skip kiteboarding...
sail_double_if_no_kite: true  # ...then sail twice as long

# Want to hit INFEASIBLE on purpose (the point is debugging it)? Try:
#   earliest_departure: "21:00"   # leave after 9 PM but home by 10 PM -> impossible
