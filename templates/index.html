<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NASA Mission Planner Demo</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='artemis-logo.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="{{ url_for('static', filename='artemis-logo.png') }}" alt="Artemis" />
          <h1>NASA Mission Planner</h1>
          <span class="brand-sub">Demo</span>
        </div>
        <div class="topbar-actions">
          <select id="example-select" class="select" aria-label="Load an example">
            <option value="">Load an example…</option>
          </select>
          <button type="button" id="solve-btn" class="btn btn-primary">Solve now</button>
        </div>
      </header>

      <nav class="tabs" id="tabs" aria-label="Saved plans"></nav>

      <div class="plan-actions" role="toolbar" aria-label="Plan actions">
        <button type="button" id="undo-btn" class="btn btn-ghost btn-sm" title="Undo (Ctrl+Z)" disabled>↶ Undo</button>
        <button type="button" id="redo-btn" class="btn btn-ghost btn-sm" title="Redo (Ctrl+Shift+Z)" disabled>↷ Redo</button>
        <span class="plan-actions-sep" aria-hidden="true"></span>
        <button type="button" id="plan-duplicate" class="btn btn-ghost btn-sm" title="Duplicate this plan into a new tab">⧉ Duplicate</button>
        <button type="button" id="plan-export" class="btn btn-ghost btn-sm" title="Save this plan to a file">⭳ Export</button>
        <button type="button" id="plan-import" class="btn btn-ghost btn-sm" title="Load a plan from a file (opens a new tab)">⭱ Import</button>
        <input type="file" id="plan-import-file" accept="application/json,.json" hidden />
      </div>

      <div id="alert" class="alert" role="alert" hidden></div>

      <div id="health" class="health" hidden></div>

      <!-- The AI text box is turned off for now. We keep it hidden so the JS that still uses it doesn't error. -->
      <div hidden>
        <textarea id="sentence"></textarea>
        <button type="button" id="parse-btn">Parse</button>
      </div>

      <div class="dash">
        <!-- LEFT: the activity library (click to add) and the constraints -->
        <section class="panel col-lib" id="library">
          <div class="board-head">
            <h2>On this plan</h2>
          </div>
          <div class="roster-tools">
            <input id="roster-search" class="select select-sm roster-search" type="search"
                   placeholder="Filter activities…" aria-label="Filter activities" />
          </div>
          <div id="roster-chips" class="lib-chips" role="group" aria-label="Filter by section"></div>
          <div id="roster"></div>

          <button type="button" id="browse-library" class="btn btn-ghost btn-sm lib-browse-btn">📚 Browse Library</button>

          <div class="board-head">
            <h2>Constraints</h2>
          </div>
          <button type="button" id="open-constraints" class="btn btn-ghost btn-sm lib-browse-btn">⚙ Manage constraints (0)</button>
        </section>

        <!-- CENTER: the timeline (the main view) -->
        <section class="panel col-center" id="result">
          <div class="result-head">
            <h2>Timeline</h2>
            <div class="result-actions">
              <div class="zoom-controls" role="group" aria-label="Timeline zoom">
                <label class="zoom-ctl" title="Zoom the time axis (horizontal)">
                  <span class="zoom-ico" aria-hidden="true">↔</span>
                  <input type="range" id="zoom-x" min="1" max="12" step="0.5" value="1" aria-label="Horizontal (time) zoom" />
                </label>
                <label class="zoom-ctl" title="Zoom the row height (vertical)">
                  <span class="zoom-ico" aria-hidden="true">↕</span>
                  <input type="range" id="zoom-y" min="0.8" max="3" step="0.1" value="1" aria-label="Vertical (row height) zoom" />
                </label>
                <button type="button" id="zoom-reset" class="btn btn-ghost btn-sm" title="Reset zoom to fit">Fit</button>
              </div>
              <button type="button" id="group-toggle" class="btn btn-ghost btn-sm" aria-label="Group timeline by section (click to switch)">Group: Section</button>
              <button type="button" id="view-toggle" class="btn btn-ghost btn-sm">Overview</button>
              <span id="status" class="pill" aria-live="polite"></span>
            </div>
          </div>
          <div id="banner" class="banner" hidden></div>
          <div id="explain" class="explain" hidden></div>
          <div id="timeline"></div>
        </section>
      </div>
    </div>

    <!-- Browse Library: a "storefront" catalog — filter rail + banded table (filled in by app.js) -->
    <div id="library-modal" class="modal-backdrop" hidden>
      <div class="modal modal-library" role="dialog" aria-modal="true" aria-label="Activity Library">
        <div class="modal-head">
          <h2 class="modal-title">Activity Library</h2>
          <input id="library-search" class="select modal-search" type="search"
                 placeholder="Search activities…" aria-label="Search activities" />
          <button type="button" id="library-close" class="modal-close" aria-label="Close library">×</button>
        </div>
        <!-- active-filter pills (removable) + Clear all -->
        <div id="library-pills" class="lib-pills" role="group" aria-label="Active filters"></div>
        <div class="lib-body">
          <!-- LEFT RAIL: facet groups (built by app.js) + "+ New" authoring + Export/Import -->
          <aside class="lib-rail">
            <div id="library-facets"></div>
            <div class="lib-new">
              <div class="lib-new-title">+ New activity</div>
              <input id="lib-new-name" class="select" type="text" placeholder="Name…" aria-label="New template name" />
              <div class="lib-new-line">
                <input id="lib-new-min" class="select select-sm" type="number" min="1" step="1" value="30" aria-label="Duration (minutes)" />
                <input id="lib-new-color" class="lib-new-color" type="color" value="#4f46e5" aria-label="Category color" title="Category color" />
              </div>
              <input id="lib-new-cat" class="select select-sm" type="text" list="lib-cat-options" placeholder="Category (optional)" aria-label="Category" />
              <datalist id="lib-cat-options"></datalist>
              <input id="lib-new-section" class="select select-sm" type="text" list="lib-sec-options" placeholder="Section (optional)" aria-label="Default section" />
              <datalist id="lib-sec-options"></datalist>
              <button type="button" id="lib-new-add" class="btn btn-sm btn-primary">Add to Library</button>
            </div>
            <div class="lib-rail-io">
              <button type="button" id="library-export" class="btn btn-ghost btn-sm">Export</button>
              <button type="button" id="library-import" class="btn btn-ghost btn-sm">Import</button>
              <input type="file" id="library-import-file" accept="application/json,.json" hidden />
            </div>
          </aside>
          <!-- RIGHT: count + sort, the card grid, and numbered pages -->
          <div class="lib-content">
            <div class="lib-content-head">
              <span id="library-count" class="lib-count"></span>
              <div class="lib-sort" role="group" aria-label="Sort / group">
                <button type="button" class="lib-sort-btn" data-sort="name" title="Flat table, sorted by name">Name</button>
                <button type="button" class="lib-sort-btn" data-sort="duration" title="Flat table, sorted by duration">Dur</button>
                <button type="button" class="lib-sort-btn" data-sort="category" title="Group into collapsible category bands">Group</button>
              </div>
            </div>
            <div id="library-list" class="lib-table-wrap"></div>
            <div id="library-pager" class="lib-pager"></div>
          </div>
        </div>
        <!-- fill tray: how full the plan is vs the horizon, live as you add -->
        <div id="library-tray" class="lib-tray"></div>
      </div>
    </div>

    <!-- Inspector: edits the activity you clicked. A popup so the timeline keeps the full width. -->
    <div id="inspector-modal" class="modal-backdrop" hidden>
      <div class="modal modal-narrow" role="dialog" aria-modal="true" aria-label="Inspector">
        <div class="modal-head">
          <h2 class="modal-title">Inspector</h2>
          <button type="button" id="inspector-close" class="modal-close" aria-label="Close inspector">×</button>
        </div>
        <div id="inspector" class="modal-body"></div>
      </div>
    </div>

    <!-- Constraints list: all the plan's rules in one popup so the left panel doesn't grow forever. -->
    <div id="constraints-modal" class="modal-backdrop" hidden>
      <div class="modal modal-constraints" role="dialog" aria-modal="true" aria-label="Constraints">
        <div class="modal-head">
          <h2 class="modal-title">Constraints</h2>
          <input id="con-search" class="select modal-search" type="search" placeholder="Search constraints…" aria-label="Search constraints" />
          <button type="button" id="add-constraint" class="btn btn-primary btn-sm">+ Constraint</button>
          <button type="button" id="constraints-close" class="modal-close" aria-label="Close">×</button>
        </div>
        <div id="con-chips" class="lib-chips" role="group" aria-label="Filter by type"></div>
        <div id="constraints" class="lib-cards"></div>
        <div id="constraints-pager" class="lib-pager"></div>
      </div>
    </div>

    <!-- Add constraint: a focused popup — pick a type, fill its fields, then Add. Reuses the modal shell. -->
    <div id="constraint-modal" class="modal-backdrop" hidden>
      <div class="modal modal-narrow" role="dialog" aria-modal="true" aria-label="Add constraint">
        <div class="modal-head">
          <h2 class="modal-title" id="constraint-modal-title">Add constraint</h2>
          <button type="button" id="constraint-close" class="modal-close" aria-label="Close">×</button>
        </div>
        <div class="modal-body">
          <label class="field">
            <span class="field-lbl">type</span>
            <select id="add-constraint-type" class="select select-sm" aria-label="Constraint type">
              <option value="time_window">Time window</option>
              <option value="precedence">Precedence</option>
              <option value="no_overlap">No overlap</option>
              <option value="conditional">Conditional</option>
            </select>
          </label>
          <div id="constraint-form"></div>
        </div>
        <div class="modal-foot">
          <button type="button" id="constraint-cancel" class="btn btn-ghost btn-sm">Cancel</button>
          <button type="button" id="constraint-commit" class="btn btn-primary btn-sm">+ Add constraint</button>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
