<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <h1>Schedule Optimizer</h1>
          <span class="brand-sub">manual what-if planner</span>
        </div>
        <div class="topbar-actions">
          <select id="example-select" class="select" aria-label="Load an example">
            <option value="">Load an example…</option>
          </select>
          <button type="button" id="solve-btn" class="btn btn-primary">Solve now</button>
        </div>
      </header>

      <nav class="tabs" id="tabs" aria-label="Saved plans"></nav>

      <div id="alert" class="alert" role="alert" hidden></div>

      <div id="health" class="health" hidden></div>

      <!-- The AI text box is turned off for now. We keep it hidden so the JS that still uses it doesn't error. -->
      <div hidden>
        <textarea id="sentence"></textarea>
        <button type="button" id="parse-btn">Parse</button>
      </div>

      <div class="dash">
        <!-- LEFT: the activity library (click to add), the day window, and the constraints -->
        <section class="panel col-lib" id="library">
          <div class="board-head">
            <h2>On this plan</h2>
            <button type="button" id="add-activity" class="btn btn-ghost btn-sm">+ Activity</button>
          </div>
          <div id="roster"></div>

          <div class="board-head">
            <h2>Library</h2>
          </div>
          <div id="lib-templates"></div>

          <div class="board-head">
            <h2>Day window</h2>
          </div>
          <div id="day"></div>

          <div class="board-head">
            <h2>Constraints</h2>
            <div class="add-constraint">
              <select id="add-constraint-type" class="select select-sm" aria-label="New constraint type">
                <option value="time_window">Time window</option>
                <option value="precedence">Precedence</option>
                <option value="no_overlap">No overlap</option>
                <option value="conditional">Conditional</option>
              </select>
              <button type="button" id="add-constraint" class="btn btn-ghost btn-sm">+ Constraint</button>
            </div>
          </div>
          <div id="constraints"></div>
        </section>

        <!-- CENTER: the timeline (the main view) -->
        <section class="panel col-center" id="result">
          <div class="result-head">
            <h2>Timeline</h2>
            <div class="result-actions">
              <button type="button" id="view-toggle" class="btn btn-ghost btn-sm">Overview</button>
              <span id="status" class="pill" aria-live="polite"></span>
            </div>
          </div>
          <div id="banner" class="banner" hidden></div>
          <div id="timeline"></div>
        </section>

        <!-- RIGHT: the inspector — edit panel for the activity you clicked (filled in by app.js) -->
        <section class="panel col-insp" id="inspector"></section>
      </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
