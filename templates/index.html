<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <h1>Schedule Optimizer</h1>
          <span class="brand-sub">manual what-if planner</span>
        </div>
        <div class="topbar-actions">
          <select id="example-select" class="select" aria-label="Load an example">
            <option value="">Load an example…</option>
          </select>
          <button type="button" id="solve-btn" class="btn btn-primary">Solve now</button>
        </div>
      </header>

      <div id="alert" class="alert" role="alert" hidden></div>

      <!-- Dormant AI path: kept in the DOM so existing JS wiring stays valid; hidden in the manual MVP. -->
      <div hidden>
        <textarea id="sentence"></textarea>
        <button type="button" id="parse-btn">Parse</button>
      </div>

      <div class="dash">
        <!-- LEFT: the controls -->
        <section class="panel col-left" id="board">
          <div class="board-head">
            <h2>Day window</h2>
          </div>
          <div id="day"></div>

          <div class="board-head">
            <h2>Activities</h2>
            <button type="button" id="add-activity" class="btn btn-ghost btn-sm">+ Activity</button>
          </div>
          <div id="activities"></div>

          <div class="board-head">
            <h2>Constraints</h2>
            <div class="add-constraint">
              <select id="add-constraint-type" class="select select-sm" aria-label="New constraint type">
                <option value="time_window">Time window</option>
                <option value="precedence">Precedence</option>
                <option value="no_overlap">No overlap</option>
                <option value="conditional">Conditional</option>
              </select>
              <button type="button" id="add-constraint" class="btn btn-ghost btn-sm">+ Constraint</button>
            </div>
          </div>
          <div id="constraints"></div>
        </section>

        <!-- RIGHT: the timeline (the centerpiece) -->
        <section class="panel col-right" id="result">
          <div class="result-head">
            <h2>Timeline</h2>
            <span id="status" class="pill" aria-live="polite"></span>
          </div>
          <div id="banner" class="banner" hidden></div>
          <div id="timeline"></div>
        </section>
      </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
